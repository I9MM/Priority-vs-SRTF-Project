<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C1 — Priority vs SRTF Scheduler</title>
<link rel="stylesheet" href="style.css">
</head>


<body>

<div class="container">

    <div class="page" id="page-results">
      <div class="two-col">
        <div class="panel">
          <h2 style="color:#2980b9; font-size:16px;">Priority Results <span class="algo-tag tag-pr">PR</span></h2>
          <table class="rtable" id="pr-rtable" style="font-size:12px; font-family:monospace;"></table>
        </div>
        <div class="panel">
          <h2 style="color:#d35400; font-size:16px;">SRTF Results <span class="algo-tag tag-sf">SRTF</span></h2>
          <table class="rtable" id="sf-rtable" style="font-size:12px; font-family:monospace;"></table>
        </div>
      </div>
    </div>

        <!-- Member 5: Comparative Analysis Visuals -->
    <div class="page" id="page-compare">
      <div class="panel">
        <h2 style="font-size:16px;">Average Metrics Comparison</h2>
        <div class="cmp-grid" id="cmp-grid"></div>
      </div>
      <div class="panel">
        <h2 style="font-size:16px;">Per-Process Waiting Time</h2>
        <div id="wt-bars"></div>
      </div>
    </div>

<script src="script.js"></script>
</body>
</html>
